# Dev-конфиг реверс-прокси (локальный docker compose).
# Прод-конфиг (домен, TLS, поддомен админки) появится на шаге 0.7.

server {
    listen 80;
    server_name _;

    # Единый API бэкенда
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Strapi в dev доступен напрямую на :1337 (админка), через nginx не проксируем,
    # чтобы не конфликтовать путями /api. На проде админка уедет на поддомен.

    location / {
        default_type text/plain;
        return 404 "Витрина в dev-режиме запускается отдельно (make frontend-dev, порт 8080).\n";
    }
}
