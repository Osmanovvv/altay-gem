name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: backend (lint, test, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test src
      - name: Build
        run: bun run build

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install
        run: bun install --frozen-lockfile
      # Линт фронта временно вне CI: унаследованный код с CRLF даёт тысячи
      # format-ошибок. Включим после нормализации line endings (.gitattributes).
      - name: Build
        run: bun run build
